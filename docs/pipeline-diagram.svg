<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 710" width="1000" height="710">
  <defs>
    <!-- Arrowhead markers -->
    <marker id="arr-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3fb950"/>
    </marker>
    <marker id="arr-orange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f0883e"/>
    </marker>
    <marker id="arr-purple" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#bc8cff"/>
    </marker>
    <marker id="arr-teal" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#39c5bb"/>
    </marker>
    <marker id="arr-blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#58a6ff"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1000" height="710" fill="#0d1117"/>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- SUBGRAPH BOXES                                  -->
  <!-- ═══════════════════════════════════════════════ -->

  <!-- PIPES: Detection Pipelines  x=20 y=70 w=150 h=280 -->
  <rect x="20" y="70" width="150" height="280" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="95" y="88" text-anchor="middle" font-family="monospace" font-size="10" fill="#8b949e">Detection Pipelines</text>

  <!-- TOOLS: Detection Tools  x=208 y=50 w=140 h=420 -->
  <rect x="208" y="50" width="140" height="420" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="278" y="68" text-anchor="middle" font-family="monospace" font-size="10" fill="#8b949e">Detection Tools</text>

  <!-- VALIDATE: Detection Suite v2  x=415 y=50 w=150 h=295 -->
  <!-- gap between TOOLS right (348) and VALIDATE left (415) = 67px -->
  <rect x="415" y="50" width="150" height="295" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="490" y="68" text-anchor="middle" font-family="monospace" font-size="10" fill="#8b949e">Detection Suite v2</text>

  <!-- IRCHAIN: Incident Response  x=415 y=385 w=150 h=265 -->
  <!-- gap between VALIDATE bottom (345) and IRCHAIN top (385) = 40px -->
  <rect x="415" y="385" width="150" height="265" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="490" y="403" text-anchor="middle" font-family="monospace" font-size="10" fill="#8b949e">Incident Response</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- EDGES — drawn before nodes so nodes sit on top  -->
  <!-- ═══════════════════════════════════════════════ -->

  <!-- DATA FLOW  #3fb950 solid -->
  <!-- TI → DP (vertical within PIPES) -->
  <path d="M 95,132 L 95,159" stroke="#3fb950" stroke-width="1.8" fill="none" marker-end="url(#arr-green)"/>
  <!-- DP → SF (PIPES → TOOLS) -->
  <path d="M 145,173 C 185,173 185,95 228,95" stroke="#3fb950" stroke-width="1.8" fill="none" marker-end="url(#arr-green)"/>
  <!-- LN → DW (TOOLS → VALIDATE, up) -->
  <path d="M 328,320 C 375,320 375,105 440,105" stroke="#3fb950" stroke-width="1.8" fill="none" marker-end="url(#arr-green)"/>
  <!-- LN → CQ -->
  <path d="M 328,320 C 375,320 375,175 440,175" stroke="#3fb950" stroke-width="1.8" fill="none" marker-end="url(#arr-green)"/>
  <!-- SF → DW (nearly horizontal) -->
  <path d="M 328,95 C 378,95 378,105 440,105" stroke="#3fb950" stroke-width="1.8" fill="none" marker-end="url(#arr-green)"/>
  <!-- HF → AL -->
  <path d="M 328,380 C 378,380 378,245 440,245" stroke="#3fb950" stroke-width="1.8" fill="none" marker-end="url(#arr-green)"/>
  <!-- AL → DW (upward within VALIDATE) -->
  <path d="M 490,231 C 465,185 465,121 490,119" stroke="#3fb950" stroke-width="1.8" fill="none" marker-end="url(#arr-green)"/>

  <!-- IR CHAIN  #f0883e solid -->
  <!-- ET → IC -->
  <path d="M 490,449 L 490,486" stroke="#f0883e" stroke-width="1.8" fill="none" marker-end="url(#arr-orange)"/>
  <!-- IC → SR -->
  <path d="M 490,514 L 490,551" stroke="#f0883e" stroke-width="1.8" fill="none" marker-end="url(#arr-orange)"/>

  <!-- PIPELINE CALLS  #bc8cff solid -->
  <!-- PL → HF -->
  <path d="M 145,283 C 185,283 185,380 228,380" stroke="#bc8cff" stroke-width="1.8" fill="none" marker-end="url(#arr-purple)"/>
  <!-- PL → AL (long) -->
  <path d="M 145,283 C 295,283 295,245 440,245" stroke="#bc8cff" stroke-width="1.8" fill="none" marker-end="url(#arr-purple)"/>
  <!-- PL → DW (arc over boxes) -->
  <path d="M 95,269 C 95,30 415,30 440,105" stroke="#bc8cff" stroke-width="1.8" fill="none" marker-end="url(#arr-purple)"/>
  <!-- DS → LN -->
  <path d="M 145,228 C 185,228 185,320 228,320" stroke="#bc8cff" stroke-width="1.8" fill="none" marker-end="url(#arr-purple)"/>
  <!-- DS → SF -->
  <path d="M 145,228 C 185,228 185,95 228,95" stroke="#bc8cff" stroke-width="1.8" fill="none" marker-end="url(#arr-purple)"/>
  <!-- DS → DW (arc over boxes) -->
  <path d="M 145,214 C 225,25 380,55 440,105" stroke="#bc8cff" stroke-width="1.8" fill="none" marker-end="url(#arr-purple)"/>

  <!-- TELEMETRY  #39c5bb solid -->
  <!-- EF → LN (downward within TOOLS) -->
  <path d="M 278,274 L 278,306" stroke="#39c5bb" stroke-width="1.8" fill="none" marker-end="url(#arr-teal)"/>

  <!-- MONITORS  #58a6ff dotted -->
  <!-- SF → ND -->
  <path d="M 328,95  C 570,95  680,315 790,315" stroke="#58a6ff" stroke-width="1.2" fill="none" stroke-dasharray="5,4" marker-end="url(#arr-blue)" opacity="0.75"/>
  <!-- YF → ND -->
  <path d="M 328,150 C 570,150 680,319 790,319" stroke="#58a6ff" stroke-width="1.2" fill="none" stroke-dasharray="5,4" marker-end="url(#arr-blue)" opacity="0.75"/>
  <!-- SNF → ND -->
  <path d="M 328,205 C 570,205 680,323 790,323" stroke="#58a6ff" stroke-width="1.2" fill="none" stroke-dasharray="5,4" marker-end="url(#arr-blue)" opacity="0.75"/>
  <!-- EF → ND -->
  <path d="M 328,260 C 570,260 680,327 790,327" stroke="#58a6ff" stroke-width="1.2" fill="none" stroke-dasharray="5,4" marker-end="url(#arr-blue)" opacity="0.75"/>
  <!-- LN → ND -->
  <path d="M 328,320 C 570,320 680,331 790,331" stroke="#58a6ff" stroke-width="1.2" fill="none" stroke-dasharray="5,4" marker-end="url(#arr-blue)" opacity="0.75"/>
  <!-- HF → ND -->
  <path d="M 328,380 C 570,380 680,335 790,335" stroke="#58a6ff" stroke-width="1.2" fill="none" stroke-dasharray="5,4" marker-end="url(#arr-blue)" opacity="0.75"/>
  <!-- AL → ND -->
  <path d="M 565,245 C 660,245 715,321 790,321" stroke="#58a6ff" stroke-width="1.2" fill="none" stroke-dasharray="5,4" marker-end="url(#arr-blue)" opacity="0.75"/>
  <!-- CQ → ND -->
  <path d="M 565,175 C 660,175 715,317 790,317" stroke="#58a6ff" stroke-width="1.2" fill="none" stroke-dasharray="5,4" marker-end="url(#arr-blue)" opacity="0.75"/>
  <!-- TI → ND -->
  <path d="M 145,118 C 465,118 660,313 790,313" stroke="#58a6ff" stroke-width="1.2" fill="none" stroke-dasharray="5,4" marker-end="url(#arr-blue)" opacity="0.75"/>
  <!-- DW → ND -->
  <path d="M 565,105 C 660,105 715,311 790,311" stroke="#58a6ff" stroke-width="1.2" fill="none" stroke-dasharray="5,4" marker-end="url(#arr-blue)" opacity="0.75"/>
  <!-- IC → ND -->
  <path d="M 565,500 C 670,500 730,345 790,345" stroke="#58a6ff" stroke-width="1.2" fill="none" stroke-dasharray="5,4" marker-end="url(#arr-blue)" opacity="0.75"/>
  <!-- DP → ND -->
  <path d="M 145,173 C 465,173 660,316 790,316" stroke="#58a6ff" stroke-width="1.2" fill="none" stroke-dasharray="5,4" marker-end="url(#arr-blue)" opacity="0.75"/>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- NODES                                           -->
  <!-- ═══════════════════════════════════════════════ -->

  <!-- PIPES nodes (cx=95, node w=100, h=28) -->
  <!-- TI: intel fill=#1e4a4a stroke=#2a6a6a   cy=118 -->
  <rect x="45" y="104" width="100" height="28" rx="5" fill="#1e4a4a" stroke="#2a6a6a" stroke-width="1.5"/>
  <text x="95" y="122" text-anchor="middle" font-family="monospace" font-size="11" fill="#ffffff">Threat Intel</text>

  <!-- DP: pipeline fill=#1e4a4a stroke=#2a7a7a  cy=173 -->
  <rect x="45" y="159" width="100" height="28" rx="5" fill="#1e4a4a" stroke="#2a7a7a" stroke-width="1.5"/>
  <text x="95" y="177" text-anchor="middle" font-family="monospace" font-size="11" fill="#ffffff">det-pipeline</text>

  <!-- DS: pipeline  cy=228 -->
  <rect x="45" y="214" width="100" height="28" rx="5" fill="#1e4a4a" stroke="#2a7a7a" stroke-width="1.5"/>
  <text x="95" y="232" text-anchor="middle" font-family="monospace" font-size="11" fill="#ffffff">drift-scan</text>

  <!-- PL: pipeline  cy=283 -->
  <rect x="45" y="269" width="100" height="28" rx="5" fill="#1e4a4a" stroke="#2a7a7a" stroke-width="1.5"/>
  <text x="95" y="287" text-anchor="middle" font-family="monospace" font-size="11" fill="#ffffff">purple-loop</text>

  <!-- TOOLS nodes (cx=278, node w=100, h=28) -->
  <!-- SF: detect fill=#1e3a5f stroke=#2a5a9f  cy=95 -->
  <rect x="228" y="81" width="100" height="28" rx="5" fill="#1e3a5f" stroke="#2a5a9f" stroke-width="1.5"/>
  <text x="278" y="99" text-anchor="middle" font-family="monospace" font-size="11" fill="#ffffff">SigmaForge</text>

  <!-- YF: detect  cy=150 -->
  <rect x="228" y="136" width="100" height="28" rx="5" fill="#1e3a5f" stroke="#2a5a9f" stroke-width="1.5"/>
  <text x="278" y="154" text-anchor="middle" font-family="monospace" font-size="11" fill="#ffffff">YaraForge</text>

  <!-- SNF: detect  cy=205 -->
  <rect x="228" y="191" width="100" height="28" rx="5" fill="#1e3a5f" stroke="#2a5a9f" stroke-width="1.5"/>
  <text x="278" y="209" text-anchor="middle" font-family="monospace" font-size="11" fill="#ffffff">SnortForge</text>

  <!-- EF: detect  cy=260 -->
  <rect x="228" y="246" width="100" height="28" rx="5" fill="#1e3a5f" stroke="#2a5a9f" stroke-width="1.5"/>
  <text x="278" y="264" text-anchor="middle" font-family="monospace" font-size="11" fill="#ffffff">EndpointForge</text>

  <!-- LN: normalize fill=#1e3a2a stroke=#2a7a4a  cy=320 -->
  <rect x="228" y="306" width="100" height="28" rx="5" fill="#1e3a2a" stroke="#2a7a4a" stroke-width="1.5"/>
  <text x="278" y="324" text-anchor="middle" font-family="monospace" font-size="11" fill="#ffffff">LogNorm</text>

  <!-- HF: hunt fill=#2a1e5f stroke=#4a2a9f  cy=380 -->
  <rect x="228" y="366" width="100" height="28" rx="5" fill="#2a1e5f" stroke="#4a2a9f" stroke-width="1.5"/>
  <text x="278" y="384" text-anchor="middle" font-family="monospace" font-size="11" fill="#ffffff">HuntForge</text>

  <!-- VALIDATE nodes (cx=490, node w=100, h=28) -->
  <!-- DW: detect  cy=105 -->
  <rect x="440" y="91" width="100" height="28" rx="5" fill="#1e3a5f" stroke="#2a5a9f" stroke-width="1.5"/>
  <text x="490" y="109" text-anchor="middle" font-family="monospace" font-size="11" fill="#ffffff">DriftWatch</text>

  <!-- CQ: detect  cy=175 -->
  <rect x="440" y="161" width="100" height="28" rx="5" fill="#1e3a5f" stroke="#2a5a9f" stroke-width="1.5"/>
  <text x="490" y="179" text-anchor="middle" font-family="monospace" font-size="11" fill="#ffffff">ClusterIQ</text>

  <!-- AL: purple fill=#5f1e3a stroke=#9f2a5a  cy=245 -->
  <rect x="440" y="231" width="100" height="28" rx="5" fill="#5f1e3a" stroke="#9f2a5a" stroke-width="1.5"/>
  <text x="490" y="249" text-anchor="middle" font-family="monospace" font-size="11" fill="#ffffff">AtomicLoop</text>

  <!-- IRCHAIN nodes (cx=490, node w=100, h=28) -->
  <!-- ET: investigate fill=#3a1e5f stroke=#5a2a9f  cy=435 -->
  <rect x="440" y="421" width="100" height="28" rx="5" fill="#3a1e5f" stroke="#5a2a9f" stroke-width="1.5"/>
  <text x="490" y="439" text-anchor="middle" font-family="monospace" font-size="11" fill="#ffffff">EndpointTriage</text>

  <!-- IC: respond fill=#5f1e1e stroke=#9f2a2a  cy=500 -->
  <rect x="440" y="486" width="100" height="28" rx="5" fill="#5f1e1e" stroke="#9f2a2a" stroke-width="1.5"/>
  <text x="490" y="504" text-anchor="middle" font-family="monospace" font-size="11" fill="#ffffff">ir-chain</text>

  <!-- SR: report fill=#1e5f3a stroke=#2a9f5a  cy=565 -->
  <rect x="440" y="551" width="100" height="28" rx="5" fill="#1e5f3a" stroke="#2a9f5a" stroke-width="1.5"/>
  <text x="490" y="569" text-anchor="middle" font-family="monospace" font-size="11" fill="#ffffff">SIREN</text>

  <!-- ND: Dashboard hub fill=#5f4a1e stroke=#9f7a2a  cx=850 cy=335 -->
  <rect x="790" y="307" width="120" height="56" rx="10" fill="#5f4a1e" stroke="#9f7a2a" stroke-width="2"/>
  <text x="850" y="329" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#ffffff">Nebula</text>
  <text x="850" y="348" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#ffffff">Dashboard</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- LEGEND                                          -->
  <!-- ═══════════════════════════════════════════════ -->
  <rect x="15" y="665" width="970" height="36" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>

  <!-- monitors (blue dotted) -->
  <line x1="28" y1="683" x2="65" y2="683" stroke="#58a6ff" stroke-width="1.5" stroke-dasharray="5,4"/>
  <polygon points="65,679.5 75,683 65,686.5" fill="#58a6ff"/>
  <text x="82" y="687" font-family="monospace" font-size="10" fill="#8b949e">monitors</text>

  <!-- data flow (green solid) -->
  <line x1="175" y1="683" x2="212" y2="683" stroke="#3fb950" stroke-width="1.8"/>
  <polygon points="212,679.5 222,683 212,686.5" fill="#3fb950"/>
  <text x="229" y="687" font-family="monospace" font-size="10" fill="#8b949e">data flow</text>

  <!-- pipeline calls (purple solid) -->
  <line x1="330" y1="683" x2="367" y2="683" stroke="#bc8cff" stroke-width="1.8"/>
  <polygon points="367,679.5 377,683 367,686.5" fill="#bc8cff"/>
  <text x="384" y="687" font-family="monospace" font-size="10" fill="#8b949e">pipeline calls</text>

  <!-- IR chain (orange solid) -->
  <line x1="500" y1="683" x2="537" y2="683" stroke="#f0883e" stroke-width="1.8"/>
  <polygon points="537,679.5 547,683 537,686.5" fill="#f0883e"/>
  <text x="554" y="687" font-family="monospace" font-size="10" fill="#8b949e">IR chain</text>

  <!-- telemetry (teal solid) -->
  <line x1="650" y1="683" x2="687" y2="683" stroke="#39c5bb" stroke-width="1.8"/>
  <polygon points="687,679.5 697,683 687,686.5" fill="#39c5bb"/>
  <text x="704" y="687" font-family="monospace" font-size="10" fill="#8b949e">telemetry</text>

</svg>
