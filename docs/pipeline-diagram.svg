<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
  <defs>
    <!-- Arrowhead markers -->
    <marker id="arr-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3fb950"/>
    </marker>
    <marker id="arr-orange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f0883e"/>
    </marker>
    <marker id="arr-purple" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#bc8cff"/>
    </marker>
    <marker id="arr-teal" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#39c5bb"/>
    </marker>
    <marker id="arr-blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#58a6ff"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="600" fill="#0d1117"/>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- SUBGRAPH BOXES                                  -->
  <!-- ═══════════════════════════════════════════════ -->

  <!-- PIPES: Detection Pipelines  x=20 y=75 w=130 h=210 -->
  <rect x="20" y="75" width="130" height="210" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="85" y="93" text-anchor="middle" font-family="monospace" font-size="10" fill="#8b949e">Detection Pipelines</text>

  <!-- TOOLS: Detection Tools  x=178 y=55 w=140 h=325 -->
  <rect x="178" y="55" width="140" height="325" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="248" y="73" text-anchor="middle" font-family="monospace" font-size="10" fill="#8b949e">Detection Tools</text>

  <!-- VALIDATE: Detection Suite v2  x=346 y=55 w=130 h=215 -->
  <rect x="346" y="55" width="130" height="215" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="411" y="73" text-anchor="middle" font-family="monospace" font-size="10" fill="#8b949e">Detection Suite v2</text>

  <!-- IRCHAIN: Incident Response  x=346 y=315 w=130 h=215 -->
  <rect x="346" y="315" width="130" height="215" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="411" y="333" text-anchor="middle" font-family="monospace" font-size="10" fill="#8b949e">Incident Response</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- EDGES — drawn before nodes so nodes sit on top  -->
  <!-- ═══════════════════════════════════════════════ -->

  <!-- DATA FLOW  #3fb950 solid -->
  <!-- TI → DP (vertical within PIPES) -->
  <path d="M 85,128 L 85,142" stroke="#3fb950" stroke-width="1.8" fill="none" marker-end="url(#arr-green)"/>
  <!-- DP → SF (PIPES → TOOLS) -->
  <path d="M 130,155 C 163,155 165,95 203,95" stroke="#3fb950" stroke-width="1.8" fill="none" marker-end="url(#arr-green)"/>
  <!-- LN → DW (TOOLS → VALIDATE, up) -->
  <path d="M 293,270 C 328,270 330,105 366,105" stroke="#3fb950" stroke-width="1.8" fill="none" marker-end="url(#arr-green)"/>
  <!-- LN → CQ -->
  <path d="M 293,270 C 330,270 330,155 366,155" stroke="#3fb950" stroke-width="1.8" fill="none" marker-end="url(#arr-green)"/>
  <!-- SF → DW (nearly horizontal) -->
  <path d="M 293,95 C 330,95 330,105 366,105" stroke="#3fb950" stroke-width="1.8" fill="none" marker-end="url(#arr-green)"/>
  <!-- HF → AL -->
  <path d="M 293,316 C 330,316 330,205 366,205" stroke="#3fb950" stroke-width="1.8" fill="none" marker-end="url(#arr-green)"/>
  <!-- AL → DW (upward within VALIDATE) -->
  <path d="M 411,192 C 392,158 392,122 411,118" stroke="#3fb950" stroke-width="1.8" fill="none" marker-end="url(#arr-green)"/>

  <!-- IR CHAIN  #f0883e solid -->
  <!-- ET → IC -->
  <path d="M 411,378 L 411,402" stroke="#f0883e" stroke-width="1.8" fill="none" marker-end="url(#arr-orange)"/>
  <!-- IC → SR -->
  <path d="M 411,428 L 411,452" stroke="#f0883e" stroke-width="1.8" fill="none" marker-end="url(#arr-orange)"/>

  <!-- PIPELINE CALLS  #bc8cff solid -->
  <!-- PL → HF -->
  <path d="M 130,240 C 165,240 165,316 203,316" stroke="#bc8cff" stroke-width="1.8" fill="none" marker-end="url(#arr-purple)"/>
  <!-- PL → AL (long) -->
  <path d="M 130,240 C 238,240 250,205 366,205" stroke="#bc8cff" stroke-width="1.8" fill="none" marker-end="url(#arr-purple)"/>
  <!-- PL → DW (arc over boxes) -->
  <path d="M 85,227 C 85,38 330,38 366,105" stroke="#bc8cff" stroke-width="1.8" fill="none" marker-end="url(#arr-purple)"/>
  <!-- DS → LN -->
  <path d="M 130,195 C 165,195 165,270 203,270" stroke="#bc8cff" stroke-width="1.8" fill="none" marker-end="url(#arr-purple)"/>
  <!-- DS → SF -->
  <path d="M 130,195 C 165,195 165,95 203,95" stroke="#bc8cff" stroke-width="1.8" fill="none" marker-end="url(#arr-purple)"/>
  <!-- DS → DW (arc over boxes) -->
  <path d="M 130,183 C 200,28 315,70 366,105" stroke="#bc8cff" stroke-width="1.8" fill="none" marker-end="url(#arr-purple)"/>

  <!-- TELEMETRY  #39c5bb solid -->
  <!-- EF → LN (downward within TOOLS) -->
  <path d="M 248,237 L 248,257" stroke="#39c5bb" stroke-width="1.8" fill="none" marker-end="url(#arr-teal)"/>

  <!-- MONITORS  #58a6ff dotted -->
  <!-- SF → ND -->
  <path d="M 293,95 C 460,95 560,210 655,278" stroke="#58a6ff" stroke-width="1.2" fill="none" stroke-dasharray="5,4" marker-end="url(#arr-blue)" opacity="0.75"/>
  <!-- YF → ND -->
  <path d="M 293,138 C 460,138 560,225 655,282" stroke="#58a6ff" stroke-width="1.2" fill="none" stroke-dasharray="5,4" marker-end="url(#arr-blue)" opacity="0.75"/>
  <!-- SNF → ND -->
  <path d="M 293,181 C 460,181 560,240 655,286" stroke="#58a6ff" stroke-width="1.2" fill="none" stroke-dasharray="5,4" marker-end="url(#arr-blue)" opacity="0.75"/>
  <!-- EF → ND -->
  <path d="M 293,224 C 460,224 560,255 655,290" stroke="#58a6ff" stroke-width="1.2" fill="none" stroke-dasharray="5,4" marker-end="url(#arr-blue)" opacity="0.75"/>
  <!-- LN → ND -->
  <path d="M 293,270 C 460,270 560,280 655,294" stroke="#58a6ff" stroke-width="1.2" fill="none" stroke-dasharray="5,4" marker-end="url(#arr-blue)" opacity="0.75"/>
  <!-- HF → ND -->
  <path d="M 293,316 C 460,316 560,305 655,298" stroke="#58a6ff" stroke-width="1.2" fill="none" stroke-dasharray="5,4" marker-end="url(#arr-blue)" opacity="0.75"/>
  <!-- AL → ND -->
  <path d="M 456,205 C 545,205 590,248 655,284" stroke="#58a6ff" stroke-width="1.2" fill="none" stroke-dasharray="5,4" marker-end="url(#arr-blue)" opacity="0.75"/>
  <!-- CQ → ND -->
  <path d="M 456,155 C 545,155 590,232 655,280" stroke="#58a6ff" stroke-width="1.2" fill="none" stroke-dasharray="5,4" marker-end="url(#arr-blue)" opacity="0.75"/>
  <!-- TI → ND -->
  <path d="M 130,115 C 390,115 510,210 655,276" stroke="#58a6ff" stroke-width="1.2" fill="none" stroke-dasharray="5,4" marker-end="url(#arr-blue)" opacity="0.75"/>
  <!-- DW → ND -->
  <path d="M 456,105 C 545,105 590,218 655,274" stroke="#58a6ff" stroke-width="1.2" fill="none" stroke-dasharray="5,4" marker-end="url(#arr-blue)" opacity="0.75"/>
  <!-- IC → ND -->
  <path d="M 456,415 C 560,415 610,355 655,302" stroke="#58a6ff" stroke-width="1.2" fill="none" stroke-dasharray="5,4" marker-end="url(#arr-blue)" opacity="0.75"/>
  <!-- DP → ND -->
  <path d="M 130,155 C 390,155 510,225 655,280" stroke="#58a6ff" stroke-width="1.2" fill="none" stroke-dasharray="5,4" marker-end="url(#arr-blue)" opacity="0.75"/>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- NODES                                           -->
  <!-- ═══════════════════════════════════════════════ -->

  <!-- PIPES nodes (cx=85) -->
  <!-- TI: intel fill=#1e4a4a stroke=#2a6a6a -->
  <rect x="40" y="102" width="90" height="26" rx="5" fill="#1e4a4a" stroke="#2a6a6a" stroke-width="1.5"/>
  <text x="85" y="119" text-anchor="middle" font-family="monospace" font-size="11" fill="#ffffff">Threat Intel</text>

  <!-- DP: pipeline fill=#1e4a4a stroke=#2a7a7a -->
  <rect x="40" y="142" width="90" height="26" rx="5" fill="#1e4a4a" stroke="#2a7a7a" stroke-width="1.5"/>
  <text x="85" y="159" text-anchor="middle" font-family="monospace" font-size="11" fill="#ffffff">det-pipeline</text>

  <!-- DS: pipeline -->
  <rect x="40" y="182" width="90" height="26" rx="5" fill="#1e4a4a" stroke="#2a7a7a" stroke-width="1.5"/>
  <text x="85" y="199" text-anchor="middle" font-family="monospace" font-size="11" fill="#ffffff">drift-scan</text>

  <!-- PL: pipeline -->
  <rect x="40" y="227" width="90" height="26" rx="5" fill="#1e4a4a" stroke="#2a7a7a" stroke-width="1.5"/>
  <text x="85" y="244" text-anchor="middle" font-family="monospace" font-size="11" fill="#ffffff">purple-loop</text>

  <!-- TOOLS nodes (cx=248) -->
  <!-- SF: detect fill=#1e3a5f stroke=#2a5a9f -->
  <rect x="203" y="82" width="90" height="26" rx="5" fill="#1e3a5f" stroke="#2a5a9f" stroke-width="1.5"/>
  <text x="248" y="99" text-anchor="middle" font-family="monospace" font-size="11" fill="#ffffff">SigmaForge</text>

  <!-- YF: detect -->
  <rect x="203" y="125" width="90" height="26" rx="5" fill="#1e3a5f" stroke="#2a5a9f" stroke-width="1.5"/>
  <text x="248" y="142" text-anchor="middle" font-family="monospace" font-size="11" fill="#ffffff">YaraForge</text>

  <!-- SNF: detect -->
  <rect x="203" y="168" width="90" height="26" rx="5" fill="#1e3a5f" stroke="#2a5a9f" stroke-width="1.5"/>
  <text x="248" y="185" text-anchor="middle" font-family="monospace" font-size="11" fill="#ffffff">SnortForge</text>

  <!-- EF: detect -->
  <rect x="203" y="211" width="90" height="26" rx="5" fill="#1e3a5f" stroke="#2a5a9f" stroke-width="1.5"/>
  <text x="248" y="228" text-anchor="middle" font-family="monospace" font-size="11" fill="#ffffff">EndpointForge</text>

  <!-- LN: normalize fill=#1e3a2a stroke=#2a7a4a -->
  <rect x="203" y="257" width="90" height="26" rx="5" fill="#1e3a2a" stroke="#2a7a4a" stroke-width="1.5"/>
  <text x="248" y="274" text-anchor="middle" font-family="monospace" font-size="11" fill="#ffffff">LogNorm</text>

  <!-- HF: hunt fill=#2a1e5f stroke=#4a2a9f -->
  <rect x="203" y="303" width="90" height="26" rx="5" fill="#2a1e5f" stroke="#4a2a9f" stroke-width="1.5"/>
  <text x="248" y="320" text-anchor="middle" font-family="monospace" font-size="11" fill="#ffffff">HuntForge</text>

  <!-- VALIDATE nodes (cx=411) -->
  <!-- DW: detect -->
  <rect x="366" y="92" width="90" height="26" rx="5" fill="#1e3a5f" stroke="#2a5a9f" stroke-width="1.5"/>
  <text x="411" y="109" text-anchor="middle" font-family="monospace" font-size="11" fill="#ffffff">DriftWatch</text>

  <!-- CQ: detect -->
  <rect x="366" y="142" width="90" height="26" rx="5" fill="#1e3a5f" stroke="#2a5a9f" stroke-width="1.5"/>
  <text x="411" y="159" text-anchor="middle" font-family="monospace" font-size="11" fill="#ffffff">ClusterIQ</text>

  <!-- AL: purple fill=#5f1e3a stroke=#9f2a5a -->
  <rect x="366" y="192" width="90" height="26" rx="5" fill="#5f1e3a" stroke="#9f2a5a" stroke-width="1.5"/>
  <text x="411" y="209" text-anchor="middle" font-family="monospace" font-size="11" fill="#ffffff">AtomicLoop</text>

  <!-- IRCHAIN nodes (cx=411) -->
  <!-- ET: investigate fill=#3a1e5f stroke=#5a2a9f -->
  <rect x="366" y="352" width="90" height="26" rx="5" fill="#3a1e5f" stroke="#5a2a9f" stroke-width="1.5"/>
  <text x="411" y="369" text-anchor="middle" font-family="monospace" font-size="11" fill="#ffffff">EndpointTriage</text>

  <!-- IC: respond fill=#5f1e1e stroke=#9f2a2a -->
  <rect x="366" y="402" width="90" height="26" rx="5" fill="#5f1e1e" stroke="#9f2a2a" stroke-width="1.5"/>
  <text x="411" y="419" text-anchor="middle" font-family="monospace" font-size="11" fill="#ffffff">ir-chain</text>

  <!-- SR: report fill=#1e5f3a stroke=#2a9f5a -->
  <rect x="366" y="452" width="90" height="26" rx="5" fill="#1e5f3a" stroke="#2a9f5a" stroke-width="1.5"/>
  <text x="411" y="469" text-anchor="middle" font-family="monospace" font-size="11" fill="#ffffff">SIREN</text>

  <!-- ND: Dashboard hub fill=#5f4a1e stroke=#9f7a2a -->
  <rect x="655" y="265" width="115" height="50" rx="10" fill="#5f4a1e" stroke="#9f7a2a" stroke-width="2"/>
  <text x="712" y="286" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#ffffff">Nebula</text>
  <text x="712" y="303" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#ffffff">Dashboard</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- LEGEND                                          -->
  <!-- ═══════════════════════════════════════════════ -->
  <rect x="15" y="545" width="870" height="44" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>

  <!-- monitors (blue dotted) -->
  <line x1="28" y1="567" x2="65" y2="567" stroke="#58a6ff" stroke-width="1.5" stroke-dasharray="5,4"/>
  <polygon points="65,563.5 75,567 65,570.5" fill="#58a6ff"/>
  <text x="82" y="571" font-family="monospace" font-size="10" fill="#8b949e">monitors</text>

  <!-- data flow (green solid) -->
  <line x1="156" y1="567" x2="193" y2="567" stroke="#3fb950" stroke-width="1.8"/>
  <polygon points="193,563.5 203,567 193,570.5" fill="#3fb950"/>
  <text x="210" y="571" font-family="monospace" font-size="10" fill="#8b949e">data flow</text>

  <!-- pipeline calls (purple solid) -->
  <line x1="292" y1="567" x2="329" y2="567" stroke="#bc8cff" stroke-width="1.8"/>
  <polygon points="329,563.5 339,567 329,570.5" fill="#bc8cff"/>
  <text x="346" y="571" font-family="monospace" font-size="10" fill="#8b949e">pipeline calls</text>

  <!-- IR chain (orange solid) -->
  <line x1="448" y1="567" x2="485" y2="567" stroke="#f0883e" stroke-width="1.8"/>
  <polygon points="485,563.5 495,567 485,570.5" fill="#f0883e"/>
  <text x="502" y="571" font-family="monospace" font-size="10" fill="#8b949e">IR chain</text>

  <!-- telemetry (teal solid) -->
  <line x1="572" y1="567" x2="609" y2="567" stroke="#39c5bb" stroke-width="1.8"/>
  <polygon points="609,563.5 619,567 609,570.5" fill="#39c5bb"/>
  <text x="626" y="571" font-family="monospace" font-size="10" fill="#8b949e">telemetry</text>

</svg>
