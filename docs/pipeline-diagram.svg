<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 600" width="1100" height="600">
  <defs>
    <marker id="arr-green"  markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#3fb950"/>
    </marker>
    <marker id="arr-purple" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#bc8cff"/>
    </marker>
    <marker id="arr-orange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#f0883e"/>
    </marker>
    <marker id="arr-blue"   markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#58a6ff"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="600" fill="#0d1117"/>

  <!-- Section separators -->
  <line x1="20" y1="190" x2="1080" y2="190" stroke="#21262d" stroke-width="1"/>
  <line x1="20" y1="328" x2="1080" y2="328" stroke="#21262d" stroke-width="1"/>
  <line x1="20" y1="406" x2="1080" y2="406" stroke="#21262d" stroke-width="1"/>
  <line x1="20" y1="477" x2="1080" y2="477" stroke="#21262d" stroke-width="1"/>

  <!-- Section headers -->
  <text x="20" y="68"  font-family="monospace" font-size="11" font-weight="bold" fill="#58a6ff">Detection Pipeline</text>
  <text x="20" y="214" font-family="monospace" font-size="11" font-weight="bold" fill="#bc8cff">Purple Team Pipeline</text>
  <text x="20" y="350" font-family="monospace" font-size="11" font-weight="bold" fill="#f0883e">Incident Response</text>

  <!-- ══════════════════════════════════════════════════════ -->
  <!-- PIPELINE 1 — DETECTION                                -->
  <!-- Row A  cy=90:  Threat Intel → det-pipeline → SigmaForge → DriftWatch -->
  <!-- Row B  cy=155: LogNorm → ClusterIQ  (fed by SigmaForge ↓)            -->
  <!-- ══════════════════════════════════════════════════════ -->

  <!-- Row A edges (green data flow) -->
  <line x1="139" y1="90" x2="176" y2="90" stroke="#3fb950" stroke-width="2" marker-end="url(#arr-green)"/>
  <line x1="284" y1="90" x2="321" y2="90" stroke="#3fb950" stroke-width="2" marker-end="url(#arr-green)"/>
  <line x1="429" y1="90" x2="466" y2="90" stroke="#3fb950" stroke-width="2" marker-end="url(#arr-green)"/>

  <!-- Row A nodes -->
  <rect x="31"  y="74" width="108" height="32" rx="6" fill="#1e4a4a" stroke="#2a6a6a" stroke-width="1.5"/>
  <text x="85"  y="94" text-anchor="middle" font-family="monospace" font-size="11" fill="#ffffff">Threat Intel</text>

  <rect x="176" y="74" width="108" height="32" rx="6" fill="#1e4a4a" stroke="#2a7a7a" stroke-width="1.5"/>
  <text x="230" y="94" text-anchor="middle" font-family="monospace" font-size="11" fill="#ffffff">det-pipeline</text>

  <rect x="321" y="74" width="108" height="32" rx="6" fill="#1e3a5f" stroke="#2a5a9f" stroke-width="1.5"/>
  <text x="375" y="94" text-anchor="middle" font-family="monospace" font-size="11" fill="#ffffff">SigmaForge</text>

  <rect x="466" y="74" width="108" height="32" rx="6" fill="#1e3a5f" stroke="#2a5a9f" stroke-width="1.5"/>
  <text x="520" y="94" text-anchor="middle" font-family="monospace" font-size="11" fill="#ffffff">DriftWatch</text>

  <text x="585" y="94" font-family="monospace" font-size="10" fill="#484f58">→ gap found</text>

  <!-- Vertical SigmaForge ↓ LogNorm -->
  <line x1="375" y1="106" x2="375" y2="139" stroke="#3fb950" stroke-width="2" marker-end="url(#arr-green)"/>

  <!-- Row B edge -->
  <line x1="429" y1="155" x2="466" y2="155" stroke="#3fb950" stroke-width="2" marker-end="url(#arr-green)"/>

  <!-- Row B nodes -->
  <rect x="321" y="139" width="108" height="32" rx="6" fill="#1e3a2a" stroke="#2a7a4a" stroke-width="1.5"/>
  <text x="375" y="159" text-anchor="middle" font-family="monospace" font-size="11" fill="#ffffff">LogNorm</text>

  <rect x="466" y="139" width="108" height="32" rx="6" fill="#1e3a5f" stroke="#2a5a9f" stroke-width="1.5"/>
  <text x="520" y="159" text-anchor="middle" font-family="monospace" font-size="11" fill="#ffffff">ClusterIQ</text>

  <text x="585" y="159" font-family="monospace" font-size="10" fill="#484f58">→ alert clustered</text>

  <!-- ══════════════════════════════════════════════════════ -->
  <!-- PIPELINE 2 — PURPLE TEAM                              -->
  <!-- Row A  cy=232: HuntForge → AtomicLoop → DriftWatch    -->
  <!-- Row B  cy=296: drift-scan → LogNorm  (↑ into AL)      -->
  <!-- ══════════════════════════════════════════════════════ -->

  <!-- Row A edges (green data flow) -->
  <line x1="139" y1="232" x2="176" y2="232" stroke="#3fb950" stroke-width="2" marker-end="url(#arr-green)"/>
  <line x1="284" y1="232" x2="321" y2="232" stroke="#3fb950" stroke-width="2" marker-end="url(#arr-green)"/>

  <!-- Row A nodes -->
  <rect x="31"  y="216" width="108" height="32" rx="6" fill="#2a1e5f" stroke="#4a2a9f" stroke-width="1.5"/>
  <text x="85"  y="236" text-anchor="middle" font-family="monospace" font-size="11" fill="#ffffff">HuntForge</text>

  <rect x="176" y="216" width="108" height="32" rx="6" fill="#5f1e3a" stroke="#9f2a5a" stroke-width="1.5"/>
  <text x="230" y="236" text-anchor="middle" font-family="monospace" font-size="11" fill="#ffffff">AtomicLoop</text>

  <rect x="321" y="216" width="108" height="32" rx="6" fill="#1e3a5f" stroke="#2a5a9f" stroke-width="1.5"/>
  <text x="375" y="236" text-anchor="middle" font-family="monospace" font-size="11" fill="#ffffff">DriftWatch</text>

  <text x="440" y="236" font-family="monospace" font-size="10" fill="#484f58">→ detection validated</text>

  <!-- Row B edges (purple pipeline calls) -->
  <line x1="139" y1="296" x2="176" y2="296" stroke="#bc8cff" stroke-width="2" marker-end="url(#arr-purple)"/>

  <!-- LogNorm ↑ AtomicLoop (pipeline call) -->
  <line x1="230" y1="280" x2="230" y2="248" stroke="#bc8cff" stroke-width="2" marker-end="url(#arr-purple)"/>

  <!-- Row B nodes -->
  <rect x="31"  y="280" width="108" height="32" rx="6" fill="#1e4a4a" stroke="#2a7a7a" stroke-width="1.5"/>
  <text x="85"  y="300" text-anchor="middle" font-family="monospace" font-size="11" fill="#ffffff">drift-scan</text>

  <rect x="176" y="280" width="108" height="32" rx="6" fill="#1e3a2a" stroke="#2a7a4a" stroke-width="1.5"/>
  <text x="230" y="300" text-anchor="middle" font-family="monospace" font-size="11" fill="#ffffff">LogNorm</text>

  <!-- ══════════════════════════════════════════════════════ -->
  <!-- PIPELINE 3 — INCIDENT RESPONSE                        -->
  <!-- EndpointTriage → ir-chain → SIREN                     -->
  <!-- ══════════════════════════════════════════════════════ -->

  <!-- Edges (orange IR chain) -->
  <line x1="139" y1="372" x2="186" y2="372" stroke="#f0883e" stroke-width="2" marker-end="url(#arr-orange)"/>
  <line x1="294" y1="372" x2="341" y2="372" stroke="#f0883e" stroke-width="2" marker-end="url(#arr-orange)"/>

  <!-- Nodes -->
  <rect x="31"  y="356" width="108" height="32" rx="6" fill="#3a1e5f" stroke="#5a2a9f" stroke-width="1.5"/>
  <text x="85"  y="376" text-anchor="middle" font-family="monospace" font-size="11" fill="#ffffff">EndpointTriage</text>

  <rect x="186" y="356" width="108" height="32" rx="6" fill="#5f1e1e" stroke="#9f2a2a" stroke-width="1.5"/>
  <text x="240" y="376" text-anchor="middle" font-family="monospace" font-size="11" fill="#ffffff">ir-chain</text>

  <rect x="341" y="356" width="108" height="32" rx="6" fill="#1e5f3a" stroke="#2a9f5a" stroke-width="1.5"/>
  <text x="395" y="376" text-anchor="middle" font-family="monospace" font-size="11" fill="#ffffff">SIREN</text>

  <text x="460" y="376" font-family="monospace" font-size="10" fill="#484f58">→ report generated</text>

  <!-- ══════════════════════════════════════════════════════ -->
  <!-- DASHBOARD MONITORING ROW                              -->
  <!-- nebula-dashboard (gold) + monitored tool nodes        -->
  <!-- ══════════════════════════════════════════════════════ -->

  <!-- Monitor bus line -->
  <line x1="140" y1="444" x2="1007" y2="444" stroke="#58a6ff" stroke-width="1" stroke-dasharray="4,4" opacity="0.45"/>

  <!-- Hub node -->
  <rect x="10"  y="431" width="130" height="26" rx="6" fill="#5f4a1e" stroke="#9f7a2a" stroke-width="2"/>
  <text x="75"  y="448" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#ffffff">nebula-dashboard</text>

  <!-- Monitored nodes (78×26, gap=8, cy=444) -->
  <rect x="155" y="431" width="78" height="26" rx="5" fill="#1e3a5f" stroke="#2a5a9f" stroke-width="1"/>
  <text x="194" y="448" text-anchor="middle" font-family="monospace" font-size="9" fill="#ffffff">SigmaForge</text>

  <rect x="241" y="431" width="78" height="26" rx="5" fill="#1e3a5f" stroke="#2a5a9f" stroke-width="1"/>
  <text x="280" y="448" text-anchor="middle" font-family="monospace" font-size="9" fill="#ffffff">YaraForge</text>

  <rect x="327" y="431" width="78" height="26" rx="5" fill="#1e3a5f" stroke="#2a5a9f" stroke-width="1"/>
  <text x="366" y="448" text-anchor="middle" font-family="monospace" font-size="9" fill="#ffffff">SnortForge</text>

  <rect x="413" y="431" width="78" height="26" rx="5" fill="#1e3a5f" stroke="#2a5a9f" stroke-width="1"/>
  <text x="452" y="448" text-anchor="middle" font-family="monospace" font-size="9" fill="#ffffff">EndpointForge</text>

  <rect x="499" y="431" width="78" height="26" rx="5" fill="#1e3a2a" stroke="#2a7a4a" stroke-width="1"/>
  <text x="538" y="448" text-anchor="middle" font-family="monospace" font-size="9" fill="#ffffff">LogNorm</text>

  <rect x="585" y="431" width="78" height="26" rx="5" fill="#2a1e5f" stroke="#4a2a9f" stroke-width="1"/>
  <text x="624" y="448" text-anchor="middle" font-family="monospace" font-size="9" fill="#ffffff">HuntForge</text>

  <rect x="671" y="431" width="78" height="26" rx="5" fill="#1e3a5f" stroke="#2a5a9f" stroke-width="1"/>
  <text x="710" y="448" text-anchor="middle" font-family="monospace" font-size="9" fill="#ffffff">DriftWatch</text>

  <rect x="757" y="431" width="78" height="26" rx="5" fill="#1e3a5f" stroke="#2a5a9f" stroke-width="1"/>
  <text x="796" y="448" text-anchor="middle" font-family="monospace" font-size="9" fill="#ffffff">ClusterIQ</text>

  <rect x="843" y="431" width="78" height="26" rx="5" fill="#5f1e3a" stroke="#9f2a5a" stroke-width="1"/>
  <text x="882" y="448" text-anchor="middle" font-family="monospace" font-size="9" fill="#ffffff">AtomicLoop</text>

  <rect x="929" y="431" width="78" height="26" rx="5" fill="#1e5f3a" stroke="#2a9f5a" stroke-width="1"/>
  <text x="968" y="448" text-anchor="middle" font-family="monospace" font-size="9" fill="#ffffff">SIREN</text>

  <!-- ══════════════════════════════════════════════════════ -->
  <!-- LEGEND                                                 -->
  <!-- ══════════════════════════════════════════════════════ -->
  <rect x="20" y="500" width="1060" height="40" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>

  <line x1="50"  y1="520" x2="87"  y2="520" stroke="#3fb950" stroke-width="2"/>
  <polygon points="87,516.5 97,520 87,523.5" fill="#3fb950"/>
  <text x="103" y="524" font-family="monospace" font-size="10" fill="#8b949e">data flow</text>

  <line x1="280" y1="520" x2="317" y2="520" stroke="#bc8cff" stroke-width="2"/>
  <polygon points="317,516.5 327,520 317,523.5" fill="#bc8cff"/>
  <text x="333" y="524" font-family="monospace" font-size="10" fill="#8b949e">pipeline calls</text>

  <line x1="530" y1="520" x2="567" y2="520" stroke="#f0883e" stroke-width="2"/>
  <polygon points="567,516.5 577,520 567,523.5" fill="#f0883e"/>
  <text x="583" y="524" font-family="monospace" font-size="10" fill="#8b949e">IR chain</text>

  <line x1="750" y1="520" x2="787" y2="520" stroke="#58a6ff" stroke-width="1.5" stroke-dasharray="4,4"/>
  <polygon points="787,516.5 797,520 787,523.5" fill="#58a6ff"/>
  <text x="803" y="524" font-family="monospace" font-size="10" fill="#8b949e">monitors</text>

</svg>
