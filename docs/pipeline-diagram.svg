<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 540" width="800" height="540">
  <defs>
    <marker id="arr-green"  markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#3fb950"/>
    </marker>
    <marker id="arr-purple" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#bc8cff"/>
    </marker>
    <marker id="arr-orange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#f0883e"/>
    </marker>
    <marker id="arr-blue"   markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#58a6ff"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="540" fill="#0d1117"/>

  <!-- Section separators -->
  <line x1="15" y1="112" x2="785" y2="112" stroke="#21262d" stroke-width="1"/>
  <line x1="15" y1="254" x2="785" y2="254" stroke="#21262d" stroke-width="1"/>
  <line x1="15" y1="332" x2="785" y2="332" stroke="#21262d" stroke-width="1"/>
  <line x1="15" y1="430" x2="785" y2="430" stroke="#21262d" stroke-width="1"/>

  <!-- ══════════════════════════════════════════════ -->
  <!-- ROW 1 — DETECTION PIPELINE                     -->
  <!-- Nodes cy=60, w=130, h=36, rx=6                 -->
  <!-- TI cx=85  DP cx=245  SF cx=405  DW cx=565       -->
  <!-- ══════════════════════════════════════════════ -->

  <text x="20" y="35" font-family="monospace" font-size="11" font-weight="bold" fill="#3fb950">Detection Pipeline</text>

  <!-- Arrows (green, y=60) -->
  <line x1="150" y1="60" x2="180" y2="60" stroke="#3fb950" stroke-width="2" marker-end="url(#arr-green)"/>
  <line x1="310" y1="60" x2="340" y2="60" stroke="#3fb950" stroke-width="2" marker-end="url(#arr-green)"/>
  <line x1="470" y1="60" x2="500" y2="60" stroke="#3fb950" stroke-width="2" marker-end="url(#arr-green)"/>

  <!-- Threat Intel  cx=85 cy=60 — pipeline/intel -->
  <rect x="20"  y="42" width="130" height="36" rx="6" fill="#1e4a4a" stroke="#2a6a6a" stroke-width="1.5"/>
  <text x="85"  y="64" text-anchor="middle" font-family="monospace" font-size="11" fill="#ffffff">Threat Intel</text>

  <!-- det-pipeline  cx=245 cy=60 — pipeline -->
  <rect x="180" y="42" width="130" height="36" rx="6" fill="#1e4a4a" stroke="#2a7a7a" stroke-width="1.5"/>
  <text x="245" y="64" text-anchor="middle" font-family="monospace" font-size="11" fill="#ffffff">det-pipeline</text>

  <!-- SigmaForge  cx=405 cy=60 — detect -->
  <rect x="340" y="42" width="130" height="36" rx="6" fill="#1e3a5f" stroke="#2a5a9f" stroke-width="1.5"/>
  <text x="405" y="64" text-anchor="middle" font-family="monospace" font-size="11" fill="#ffffff">SigmaForge</text>

  <!-- DriftWatch  cx=565 cy=60 — detect -->
  <rect x="500" y="42" width="130" height="36" rx="6" fill="#1e3a5f" stroke="#2a5a9f" stroke-width="1.5"/>
  <text x="565" y="64" text-anchor="middle" font-family="monospace" font-size="11" fill="#ffffff">DriftWatch</text>

  <text x="640" y="78" font-family="monospace" font-size="10" fill="#6e7681">→ gap found</text>

  <!-- ══════════════════════════════════════════════ -->
  <!-- ROW 2 — PURPLE TEAM PIPELINE                   -->
  <!-- Main  cy=160: HuntForge  AtomicLoop  DriftWatch -->
  <!-- Sub   cy=215: drift-scan  LogNorm  ↑ into AL    -->
  <!-- ══════════════════════════════════════════════ -->

  <text x="20" y="135" font-family="monospace" font-size="11" font-weight="bold" fill="#bc8cff">Purple Team Pipeline</text>

  <!-- Main row arrows (green, y=160) -->
  <line x1="150" y1="160" x2="180" y2="160" stroke="#3fb950" stroke-width="2" marker-end="url(#arr-green)"/>
  <line x1="310" y1="160" x2="340" y2="160" stroke="#3fb950" stroke-width="2" marker-end="url(#arr-green)"/>

  <!-- HuntForge  cx=85 cy=160 — hunt -->
  <rect x="20"  y="142" width="130" height="36" rx="6" fill="#2a1e5f" stroke="#4a2a9f" stroke-width="1.5"/>
  <text x="85"  y="164" text-anchor="middle" font-family="monospace" font-size="11" fill="#ffffff">HuntForge</text>

  <!-- AtomicLoop  cx=245 cy=160 — atomicloop -->
  <rect x="180" y="142" width="130" height="36" rx="6" fill="#5f1e3a" stroke="#9f2a5a" stroke-width="1.5"/>
  <text x="245" y="164" text-anchor="middle" font-family="monospace" font-size="11" fill="#ffffff">AtomicLoop</text>

  <!-- DriftWatch  cx=405 cy=160 — detect -->
  <rect x="340" y="142" width="130" height="36" rx="6" fill="#1e3a5f" stroke="#2a5a9f" stroke-width="1.5"/>
  <text x="405" y="164" text-anchor="middle" font-family="monospace" font-size="11" fill="#ffffff">DriftWatch</text>

  <text x="480" y="178" font-family="monospace" font-size="10" fill="#6e7681">→ validated</text>

  <!-- Sub-row arrows (purple pipeline calls) -->
  <!-- drift-scan → LogNorm  horizontal y=230 -->
  <line x1="150" y1="230" x2="180" y2="230" stroke="#bc8cff" stroke-width="2" marker-end="url(#arr-purple)"/>
  <!-- LogNorm → AtomicLoop  vertical upward -->
  <line x1="245" y1="212" x2="245" y2="178" stroke="#bc8cff" stroke-width="2" marker-end="url(#arr-purple)"/>

  <!-- drift-scan  cx=85 cy=230 — pipeline -->
  <rect x="20"  y="212" width="130" height="36" rx="6" fill="#1e4a4a" stroke="#2a7a7a" stroke-width="1.5"/>
  <text x="85"  y="234" text-anchor="middle" font-family="monospace" font-size="11" fill="#ffffff">drift-scan</text>

  <!-- LogNorm  cx=245 cy=230 — normalize -->
  <rect x="180" y="212" width="130" height="36" rx="6" fill="#1e3a2a" stroke="#2a7a4a" stroke-width="1.5"/>
  <text x="245" y="234" text-anchor="middle" font-family="monospace" font-size="11" fill="#ffffff">LogNorm</text>

  <!-- ══════════════════════════════════════════════ -->
  <!-- ROW 3 — INCIDENT RESPONSE                      -->
  <!-- EndpointTriage  ir-chain  SIREN   cy=280        -->
  <!-- ══════════════════════════════════════════════ -->

  <text x="20" y="255" font-family="monospace" font-size="11" font-weight="bold" fill="#f0883e">Incident Response</text>

  <!-- Arrows (orange, y=280) -->
  <line x1="150" y1="280" x2="180" y2="280" stroke="#f0883e" stroke-width="2" marker-end="url(#arr-orange)"/>
  <line x1="310" y1="280" x2="340" y2="280" stroke="#f0883e" stroke-width="2" marker-end="url(#arr-orange)"/>

  <!-- EndpointTriage  cx=85 cy=280 — investigate -->
  <rect x="20"  y="262" width="130" height="36" rx="6" fill="#3a1e5f" stroke="#5a2a9f" stroke-width="1.5"/>
  <text x="85"  y="284" text-anchor="middle" font-family="monospace" font-size="11" fill="#ffffff">EndpointTriage</text>

  <!-- ir-chain  cx=245 cy=280 — respond -->
  <rect x="180" y="262" width="130" height="36" rx="6" fill="#5f1e1e" stroke="#9f2a2a" stroke-width="1.5"/>
  <text x="245" y="284" text-anchor="middle" font-family="monospace" font-size="11" fill="#ffffff">ir-chain</text>

  <!-- SIREN  cx=405 cy=280 — report -->
  <rect x="340" y="262" width="130" height="36" rx="6" fill="#1e5f3a" stroke="#2a9f5a" stroke-width="1.5"/>
  <text x="405" y="284" text-anchor="middle" font-family="monospace" font-size="11" fill="#ffffff">SIREN</text>

  <text x="480" y="298" font-family="monospace" font-size="10" fill="#6e7681">→ report</text>

  <!-- ══════════════════════════════════════════════ -->
  <!-- DASHBOARD ROW  cy=370                          -->
  <!-- Hub w=120, small nodes w=60 gap=4, cx 64px     -->
  <!-- ══════════════════════════════════════════════ -->

  <!-- Monitor bus line (thin dotted blue) -->
  <line x1="125" y1="370" x2="796" y2="370" stroke="#58a6ff" stroke-width="1" stroke-dasharray="4,4" opacity="0.4"/>

  <!-- nebula-dashboard hub (gold)  cx=65 cy=370 -->
  <rect x="5"   y="357" width="120" height="26" rx="6" fill="#5f4a1e" stroke="#9f7a2a" stroke-width="2"/>
  <text x="65"  y="374" text-anchor="middle" font-family="monospace" font-size="9" font-weight="bold" fill="#ffffff">nebula-dashboard</text>

  <!-- Small monitored nodes  cy=370 h=26 w=65 font-size=9  (step=67px, starting x=128) -->

  <!-- SigmaForge  cx=161 -->
  <rect x="128" y="357" width="65" height="26" rx="5" fill="#1e3a5f" stroke="#2a5a9f" stroke-width="1"/>
  <text x="161" y="374" text-anchor="middle" font-family="monospace" font-size="9" fill="#ffffff">SigmaForge</text>

  <!-- YaraForge  cx=228 -->
  <rect x="195" y="357" width="65" height="26" rx="5" fill="#1e3a5f" stroke="#2a5a9f" stroke-width="1"/>
  <text x="228" y="374" text-anchor="middle" font-family="monospace" font-size="9" fill="#ffffff">YaraForge</text>

  <!-- SnortForge  cx=295 -->
  <rect x="262" y="357" width="65" height="26" rx="5" fill="#1e3a5f" stroke="#2a5a9f" stroke-width="1"/>
  <text x="295" y="374" text-anchor="middle" font-family="monospace" font-size="9" fill="#ffffff">SnortForge</text>

  <!-- EndpointForge  cx=362 -->
  <rect x="329" y="357" width="65" height="26" rx="5" fill="#1e3a5f" stroke="#2a5a9f" stroke-width="1"/>
  <text x="362" y="374" text-anchor="middle" font-family="monospace" font-size="9" fill="#ffffff">EndpointForge</text>

  <!-- LogNorm  cx=429 -->
  <rect x="396" y="357" width="65" height="26" rx="5" fill="#1e3a2a" stroke="#2a7a4a" stroke-width="1"/>
  <text x="429" y="374" text-anchor="middle" font-family="monospace" font-size="9" fill="#ffffff">LogNorm</text>

  <!-- HuntForge  cx=496 -->
  <rect x="463" y="357" width="65" height="26" rx="5" fill="#2a1e5f" stroke="#4a2a9f" stroke-width="1"/>
  <text x="496" y="374" text-anchor="middle" font-family="monospace" font-size="9" fill="#ffffff">HuntForge</text>

  <!-- DriftWatch  cx=563 -->
  <rect x="530" y="357" width="65" height="26" rx="5" fill="#1e3a5f" stroke="#2a5a9f" stroke-width="1"/>
  <text x="563" y="374" text-anchor="middle" font-family="monospace" font-size="9" fill="#ffffff">DriftWatch</text>

  <!-- ClusterIQ  cx=630 -->
  <rect x="597" y="357" width="65" height="26" rx="5" fill="#1e3a5f" stroke="#2a5a9f" stroke-width="1"/>
  <text x="630" y="374" text-anchor="middle" font-family="monospace" font-size="9" fill="#ffffff">ClusterIQ</text>

  <!-- AtomicLoop  cx=697 -->
  <rect x="664" y="357" width="65" height="26" rx="5" fill="#5f1e3a" stroke="#9f2a5a" stroke-width="1"/>
  <text x="697" y="374" text-anchor="middle" font-family="monospace" font-size="9" fill="#ffffff">AtomicLoop</text>

  <!-- SIREN  cx=764 -->
  <rect x="731" y="357" width="65" height="26" rx="5" fill="#1e5f3a" stroke="#2a9f5a" stroke-width="1"/>
  <text x="764" y="374" text-anchor="middle" font-family="monospace" font-size="9" fill="#ffffff">SIREN</text>

  <!-- ══════════════════════════════════════════════ -->
  <!-- LEGEND                                         -->
  <!-- ══════════════════════════════════════════════ -->
  <rect x="15" y="453" width="770" height="40" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>

  <!-- data flow (green) -->
  <line x1="28"  y1="473" x2="65"  y2="473" stroke="#3fb950" stroke-width="2"/>
  <polygon points="65,469.5 75,473 65,476.5" fill="#3fb950"/>
  <text x="81"  y="477" font-family="monospace" font-size="10" fill="#8b949e">data flow</text>

  <!-- pipeline calls (purple) -->
  <line x1="185" y1="473" x2="222" y2="473" stroke="#bc8cff" stroke-width="2"/>
  <polygon points="222,469.5 232,473 222,476.5" fill="#bc8cff"/>
  <text x="238" y="477" font-family="monospace" font-size="10" fill="#8b949e">pipeline calls</text>

  <!-- purple team (AtomicLoop node swatch) -->
  <rect x="338" y="465" width="18" height="16" rx="3" fill="#5f1e3a" stroke="#9f2a5a" stroke-width="1.5"/>
  <text x="362" y="477" font-family="monospace" font-size="10" fill="#8b949e">purple team</text>

  <!-- IR chain (orange) -->
  <line x1="494" y1="473" x2="531" y2="473" stroke="#f0883e" stroke-width="2"/>
  <polygon points="531,469.5 541,473 531,476.5" fill="#f0883e"/>
  <text x="547" y="477" font-family="monospace" font-size="10" fill="#8b949e">IR chain</text>

  <!-- monitors (blue dashed) -->
  <line x1="647" y1="473" x2="684" y2="473" stroke="#58a6ff" stroke-width="1.5" stroke-dasharray="4,4"/>
  <polygon points="684,469.5 694,473 684,476.5" fill="#58a6ff"/>
  <text x="700" y="477" font-family="monospace" font-size="10" fill="#8b949e">monitors</text>

</svg>
